  #   image: churnlab
  #   container_name: churnlab
  #   volumes:
  #     - .:/workspace:cached
  #   command: sleep infinity
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  app-cpu:
    build:
      context: .
      args:
        BUILD_BASE_IMAGE: "ubuntu:24.04"
    image: churnlab-cpu
    container_name: churnlab-cpu
    volumes:
      - .:/workspace:cached
    command: sleep infinity
